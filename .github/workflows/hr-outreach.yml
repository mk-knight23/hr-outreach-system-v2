name: HR Outreach Automation

on:
  # Run every 6 hours for 24/7 operation
  schedule:
    - cron: '0 */6 * * *'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - scrape
          - outreach
          - followup
          - replies
          - stats
      dry_run:
        description: 'Dry run (no emails sent)'
        required: false
        default: false
        type: boolean

# Prevent concurrent runs
concurrency:
  group: hr-outreach
  cancel-in-progress: false

jobs:
  outreach:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install gws CLI
        run: |
          # Install gws CLI (Google Workspace CLI)
          curl -fsSL https://raw.githubusercontent.com/googleworkspace/cli/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Configure gws authentication
        env:
          GWS_CREDENTIALS: ${{ secrets.GWS_CREDENTIALS }}
        run: |
          # Write service account credentials
          if [ -n "$GWS_CREDENTIALS" ]; then
            echo "$GWS_CREDENTIALS" > $HOME/gws-credentials.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gws-credentials.json" >> $GITHUB_ENV
          else
            echo "⚠️ GWS_CREDENTIALS not set - using interactive auth if available"
          fi
      
      - name: Verify gws installation
        run: |
          gws --version || echo "gws not in PATH, checking..."
          which gws || ls -la ~/.local/bin/ || echo "gws binary not found"
      
      - name: Run outreach automation
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          ACTION="${{ github.event.inputs.action || 'full' }}"
          DRY_RUN_FLAG=""
          
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          
          echo "Running action: $ACTION"
          python scripts/run_outreach.py --action $ACTION --spreadsheet-id "$SPREADSHEET_ID" $DRY_RUN_FLAG
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outreach-logs-${{ github.run_id }}
          path: |
            *.log
            data/*.json
          retention-days: 7
      
      - name: Send notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ HR Outreach Automation Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "HR Outreach Automation Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run ID:*\n${{ github.run_id }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Time:*\n$(date)"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
